<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vectab – Preview</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f0;
      color: #1a1a2e;
      height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ─────────────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      background: #1a1a2e;
      color: #fff;
      gap: 16px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    header h1 span {
      color: #7ec8e3;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .controls label {
      font-size: 0.78rem;
      opacity: 0.7;
    }

    select,
    button {
      font-size: 0.8rem;
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.1);
      color: #fff;
      cursor: pointer;
    }

    select:focus,
    button:focus {
      outline: 2px solid #7ec8e3;
      outline-offset: 2px;
    }

    button.download {
      background: #7ec8e3;
      color: #1a1a2e;
      border-color: transparent;
      font-weight: 600;
    }

    button.download:hover {
      background: #9dd6ec;
    }

    /* ── Main two-panel layout ───────────────────────────────── */
    main {
      display: grid;
      grid-template-columns: 380px 1fr;
      flex: 1;
      min-height: 0;
    }

    /* ── Editor panel ────────────────────────────────────────── */
    .editor-panel {
      display: flex;
      flex-direction: column;
      border-right: 1px solid #ddd;
      background: #fff;
      min-height: 0;
    }

    .panel-header {
      padding: 8px 14px;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #888;
      border-bottom: 1px solid #eee;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-header .error-badge {
      background: #e74c3c;
      color: #fff;
      padding: 2px 7px;
      border-radius: 10px;
      font-size: 0.65rem;
      display: none;
    }

    .panel-header .error-badge.visible {
      display: inline-block;
    }

    textarea {
      flex: 1;
      resize: none;
      border: none;
      outline: none;
      padding: 16px;
      font-family: 'Menlo', 'Consolas', 'Courier New', monospace;
      font-size: 0.82rem;
      line-height: 1.6;
      color: #1a1a2e;
      background: #fff;
      tab-size: 4;
    }

    /* ── Preview panel ───────────────────────────────────────── */
    .preview-panel {
      display: flex;
      flex-direction: column;
      min-height: 0;
      background: #f5f5f0;
      justify-content: center;
    }

    .preview-panel .panel-header {
      background: #f5f5f0;
    }

    .preview-scroll {
      flex: 1;
      overflow: auto;
      padding: 24px;
      display: block;
      box-shadow: 0 2px 16px rgba(0, 0, 0, 0.08);
      border-radius: 8px;
      background: white;
      margin: 24px auto;
    }

    .preview-scroll svg {
      max-width: 100%;
    }

    .error-msg {
      display: none;
      color: #e74c3c;
      font-size: 0.82rem;
      font-family: 'Menlo', 'Consolas', monospace;
      background: #fff0f0;
      border: 1px solid #f5c6cb;
      border-radius: 6px;
      padding: 12px 16px;
      line-height: 1.5;
    }

    .error-msg.visible {
      display: block;
    }

    .empty-state {
      color: #bbb;
      font-size: 0.85rem;
      margin: auto;
      text-align: center;
      line-height: 2;
    }

    /* ── Width slider ────────────────────────────────────────── */
    .width-control {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.78rem;
    }

    .width-control input[type=range] {
      width: 90px;
      accent-color: #7ec8e3;
      cursor: pointer;
      padding: 0;
      border: none;
      background: transparent;
    }

    .width-val {
      min-width: 38px;
      color: rgba(255, 255, 255, 0.8);
      font-variant-numeric: tabular-nums;
    }
  </style>
</head>

<body>

  <header>
    <h1>Vec<span>tab</span></h1>
    <div class="controls">
      <div class="width-control">
        <label for="widthRange">Width</label>
        <input type="range" id="widthRange" min="400" max="1200" step="40" value="800" />
        <span class="width-val" id="widthVal">800</span>
      </div>
      <label for="barsSelect">Bars/line</label>
      <select id="barsSelect">
        <option value="1">1</option>
        <option value="2">2</option>
        <option value="3">3</option>
        <option value="4" selected>4</option>
        <option value="6">6</option>
        <option value="8">8</option>
      </select>
      <label for="profileSelect">Theme</label>
      <select id="profileSelect">
        <option value="default">Default</option>
        <option value="high-contrast">High contrast</option>
        <option value="dark">Dark</option>
      </select>
      <div class="width-control">
        <label for="fontSizeRange">Font size</label>
        <input type="range" id="fontSizeRange" min="10" max="20" step="1" value="14" />
        <span class="width-val" id="fontSizeVal">14</span>
      </div>
      <button type="button" id="printBtn">Print</button>
      <button type="button" class="download" id="downloadBtn">Download SVG</button>
    </div>
  </header>

  <main>
    <div class="editor-panel">
      <div class="panel-header">
        .vtab source
        <span class="error-badge" id="errorBadge">Parse error</span>
      </div>
      <textarea id="editor" spellcheck="false" autocorrect="off" autocapitalize="off">---
title: "Major Tom"
artist: "David Bowie"
key: "C"
---

---
## Intro
| C                | Em               | x3
---
| C  Am F          | G7               |
---
## Verse
| C                | Em               |
Ground Control to Major Tom
---
| Am               | C/G              |
Take your protein pills and put
---
| G                | D                | Em               |
your helmet on above your head
---
## Chorus
| C                | Am               |
Can you hear me, Major Tom?
---
| C                | G                |
Can you hear me, Major Tom?
---</textarea>
    </div>

    <div class="preview-panel">
      <div class="panel-header">SVG preview</div>
      <div class="preview-scroll" id="preview">
        <div class="empty-state" id="emptyState">Start typing to see a preview</div>
        <div class="error-msg" id="errorMsg"></div>
      </div>
    </div>
  </main>

  <script src="vectab.js"></script>
  <script>
    const editor = document.getElementById('editor');
    const preview = document.getElementById('preview');
    const errorMsg = document.getElementById('errorMsg');
    const errorBadge = document.getElementById('errorBadge');
    const emptyState = document.getElementById('emptyState');
    const profileSel = document.getElementById('profileSelect');
    const barsSel = document.getElementById('barsSelect');
    const widthRange = document.getElementById('widthRange');
    const widthVal = document.getElementById('widthVal');
    const fontSizeRange = document.getElementById('fontSizeRange');
    const fontSizeVal = document.getElementById('fontSizeVal');
    const downloadBtn = document.getElementById('downloadBtn');

    let lastSvg = '';

    function render () {
      const source = editor.value.trim();

      // Clear previous SVG child (keep error + empty state nodes)
      const existing = preview.querySelector('svg');
      if (existing) existing.remove();

      if (!source) {
        emptyState.style.display = '';
        errorMsg.classList.remove('visible');
        errorBadge.classList.remove('visible');
        return;
      }

      emptyState.style.display = 'none';

      try {
        const vt = new Vectab(source);
        const svg = vt.render({
          width: parseInt(widthRange.value, 10),
          colorProfile: profileSel.value,
          barsPerLine: parseInt(barsSel.value, 10),
          fontSize: parseInt(fontSizeRange.value, 10),
        });
        lastSvg = svg;

        errorMsg.classList.remove('visible');
        errorBadge.classList.remove('visible');

        const wrapper = document.createElement('div');
        wrapper.innerHTML = svg;
        const svgEl = wrapper.firstChild;
        preview.insertBefore(svgEl, errorMsg);
      } catch (err) {
        lastSvg = '';
        errorMsg.textContent = String(err);
        errorMsg.classList.add('visible');
        errorBadge.classList.add('visible');
      }

      // Ensure width slider reflects current SVG width
      document.getElementById('preview').style.width = `${widthRange.value}px`;
    }

    // Live update
    editor.addEventListener('input', render);
    profileSel.addEventListener('change', render);
    barsSel.addEventListener('change', render);
    widthRange.addEventListener('input', () => {
      widthVal.textContent = widthRange.value;
      render();
    });
    fontSizeRange.addEventListener('input', () => {
      fontSizeVal.textContent = fontSizeRange.value;
      render();
    });

    // Print
    const printBtn = document.getElementById('printBtn');
    printBtn.addEventListener('click', () => {
      if (!lastSvg) return;
      const win = window.open('', '_blank');
      win.document.write(`<!DOCTYPE html><html><head><title>Print</title><style>body{margin:0}svg{width:100%;height:auto}</style></head><body>${lastSvg}</body></html>`);
      win.document.close();
      win.focus();
      win.print();
    });

    // Download
    downloadBtn.addEventListener('click', () => {
      if (!lastSvg) return;
      const blob = new Blob([lastSvg], { type: 'image/svg+xml' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'vectab.svg';
      a.click();
      URL.revokeObjectURL(url);
    });

    // Initial render
    render();
  </script>

</body>

</html>
